<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未来科创家计划 | INNOSPARK</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --blue:#2563eb;--blue-l:#3b82f6;
      --ink:#0f172a;--t1:#1e293b;--t2:#334155;--t3:#64748b;--t4:#94a3b8;
      --b1:#f1f5f9;--b2:#e2e8f0;
      --r:20px;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:#fafbfd;color:var(--t1);line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }

    /* ═══ Header ═══ */
    .hd{
      text-align:center;padding:64px 24px 52px;
      background:#fff;border-bottom:1px solid var(--b1);
    }
    .hd img{height:44px;width:auto;margin-bottom:24px;opacity:.9}
    .hd h1{
      font-size:50px;font-weight:900;color:var(--ink);
      letter-spacing:-.5px;margin-bottom:8px;
    }
    .hd p{
      font-size:20px;color:var(--t4);font-weight:500;letter-spacing:.8px;
    }

    /* ═══ Projects Grid ═══ */
    .grid{
      max-width:960px;margin:0 auto;
      padding:56px 24px 80px;
      display:grid;grid-template-columns:1fr 1fr;gap:28px;
    }

    /* ═══ Project Card ═══ */
    .card{
      display:block;text-decoration:none;color:inherit;
      background:#fff;border-radius:var(--r);
      border:1px solid var(--b1);
      box-shadow:0 0 0 1px rgba(0,0,0,.02),0 4px 24px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
      overflow:hidden;
      transition:all .3s var(--ease);
    }
    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 12px 40px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04);
    }

    /* Card Top Banner */
    .card-banner{
      height:180px;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .card-banner.bl{background:linear-gradient(135deg,#1e40af 0%,#2563eb 50%,#3b82f6 100%)}
    .card-banner::after{
      content:"";position:absolute;top:-60%;right:-30%;
      width:300px;height:300px;border-radius:50%;
      background:rgba(255,255,255,.06);
    }
    .card-banner .icon{
      font-size:52px;color:rgba(255,255,255,.18);font-weight:900;
      position:relative;z-index:1;user-select:none;
    }

    /* Card Body */
    .card-body{padding:28px 28px 32px}
    .card-body h2{
      font-size:35px;font-weight:900;color:var(--ink);
      letter-spacing:-.3px;margin-bottom:8px;
    }
    .card-body .sub{
      font-size:20px;color:var(--t3);line-height:1.7;margin-bottom:18px;
    }
    .card-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .card-tags span{
      font-size:17px;font-weight:600;padding:8px 18px;
      border-radius:100px;
    }
    .card-tags span.bl{color:var(--blue);background:#eff6ff;border:1px solid #dbeafe}

    .card-arrow{
      display:inline-flex;align-items:center;gap:6px;
      font-size:19px;font-weight:700;
      transition:gap .2s var(--ease);
    }
    .card-arrow.bl{color:var(--blue)}
    .card:hover .card-arrow{gap:12px}

    /* ═══ Footer ═══ */
    .ft{
      text-align:center;padding:36px 24px;
      border-top:1px solid var(--b1);
    }
    .ft img{height:18px;width:auto;opacity:.35;margin-bottom:8px}
    .ft p{font-size:17px;color:var(--t4)}

    /* ═══ Responsive ═══ */
    @media(max-width:768px){
      html{font-size:17px}
      .hd{padding:48px 20px 40px}
      .hd h1{font-size:38px}
      .hd img{height:36px}
      .grid{grid-template-columns:1fr;gap:20px;padding:36px 16px 60px}
      .card-body{padding:22px 22px 26px}
      .card-body h2{font-size:29px}
      .card-banner{height:140px}
      .card-banner .icon{font-size:42px}
      .card-body .sub{font-size:19px}
      .card-tags span{font-size:16px;padding:8px 16px}
      .card-arrow{font-size:18px}
      .ft p{font-size:17px}
    }
  </style>
</head>
<body>

  <div class="hd">
    <img src="logo.png" alt="科创之光 INNOSPARK">
    <h1>未来科创家计划</h1>
    <p>INNOSPARK · PROJECT SHOWCASE</p>
  </div>

  <div class="grid">

    <a class="card" href="qinghang.html">
      <div class="card-banner bl">
        <div class="icon">H₂</div>
      </div>
      <div class="card-body">
        <h2>清航时代</h2>
        <p class="sub">飞行器长续航大载重能源动力系统提供者，突破传统锂电池续航瓶颈，实现续航与载重跨越式提升。</p>
        <div class="card-tags">
          <span class="bl">新能源</span>
          <span class="bl">航空动力</span>
          <span class="bl">低空经济</span>
        </div>
        <div class="card-arrow bl">查看详情 &#8594;</div>
      </div>
    </a>

    <a class="card" href="unicone.html">
      <div class="card-banner bl">
        <div class="icon">&#9733;</div>
      </div>
      <div class="card-body">
        <h2>甜筒 UniCone</h2>
        <p class="sub">持续感知、记录个人数据的主动式服务 AI，为超级个体提升日程、人际、内容三大场景效能。</p>
        <div class="card-tags">
          <span class="bl">AI Agent</span>
          <span class="bl">人机关系</span>
          <span class="bl">超级个体</span>
        </div>
        <div class="card-arrow bl">查看详情 &#8594;</div>
      </div>
    </a>

  </div>

  <div class="ft">
    <img src="logo.png" alt="科创之光">
    <p>科创之光 INNOSPARK · 未来科创家计划</p>
  </div>

</body>
</html>
